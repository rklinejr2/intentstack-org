baseURL: https://intentstack.org/
languageCode: en-us
title: The Intent Stack

module:
  imports:
    - path: github.com/imfing/hextra

enableRobotsTXT: true

menu:
  main:
    - name: Specification
      pageRef: /docs/specification
      weight: 1
    - name: Glossary
      pageRef: /docs/glossary
      weight: 2
    - name: Diagrams
      pageRef: /docs/diagrams
      weight: 3
    - name: Positioning
      pageRef: /docs/positioning
      weight: 4
    - name: About
      pageRef: /about
      weight: 5
    - name: Engage
      pageRef: /engage
      weight: 6
    - name: Search
      weight: 7
      params:
        type: search

params:
  description: "A seven-layer reference model for governing AI agent behavior within organizations"

  navbar:
    displayTitle: true
    displayLogo: false

  theme:
    default: system
    displayToggle: true

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward

  page:
    width: wide

  footer:
    displayCopyright: true
    displayPoweredBy: false

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
